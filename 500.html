<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Prosp'Up — Erreur serveur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .error-card { text-align: center; max-width: 480px; }
    .error-code { font-size: 72px; font-weight: 700; opacity: .3; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 24px; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.97); }
    .btn-home { background: linear-gradient(135deg, #6366f1, #818cf8); }
    .btn-back { background: rgba(255,255,255,.08); }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">500</div>
    <h1>Erreur serveur interne</h1>
    <p>Une erreur inattendue s'est produite côté serveur.<br>L'équipe technique a été notifiée. Veuillez réessayer dans quelques instants.</p>
    <div class="actions">
      <a href="/v30/dashboard" class="btn btn-home">Tableau de bord</a>
      <a href="javascript:history.back()" class="btn btn-back">Retour</a>
    </div>
  </div>
</body>
</html>
