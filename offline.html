<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Prosp'Up — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .offline-card {
      text-align: center;
      max-width: 360px;
    }
    .offline-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: .7;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .btn-retry {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-retry:hover { opacity: .85; }
    .btn-retry:active { transform: scale(.97); }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">&#x1F4F6;</div>
    <h1>Vous êtes hors ligne</h1>
    <p>Impossible de se connecter au serveur Prosp'Up.<br>Vérifiez votre connexion Internet et réessayez.</p>
    <button class="btn-retry" onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
