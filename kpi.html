<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="ProspUp — CRM Prospection B2B par Up Technologies. Gestion de prospects, suivi des relances et pilotage commercial.">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="icon" href="/static/favicon.ico">
  <title>ProspUp — KPI</title>
<link rel="stylesheet" href="/static/css/style.css?v=2103" />
</head>
<body data-page="kpi">
  <div class="container">
    <header>
      <h1><img src="/static/logo-up-technologies.png" alt="Up Technologies" class="header-logo-app"> ProspUp — KPI</h1>
      <p class="header-subtitle">Checklist rapide → Excel de validation.</p>
    </header>

    <div class="main-layout">
                        <aside class="sidebar"></aside>

      <main class="content">
        <div class="content-header">
          <div class="content-title">Excel de validation</div>
        </div>

        <div class="settings-section">
          <h3>🗓️ Date</h3>
          <div class="settings-group">
            <input id="kpiDate" type="date" class="input" style="max-width: 220px;" />
            <input id="kpiTitle" type="text" class="input" placeholder="Titre (ex: Semaine 06)" style="flex:1; min-width: 240px;" />
            <button class="btn btn-primary" id="btnKpiExport">📄 Générer Excel</button>
          </div>
          <div class="muted" style="margin-top:10px;">Astuce : ajoutez un commentaire sur une ligne si besoin (ex: nom client, contexte, etc.).</div>
        </div>

        <div class="settings-section">
          <h3>✅ Checklist KPI</h3>
          <div id="kpiChecklist" class="card-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px;"></div>
        </div>

        <div class="settings-section">
          <h3>📦 Modèles rapides</h3>
          <div class="settings-group">
            <button class="btn btn-secondary" id="btnKpiSelectAll">Tout cocher</button>
            <button class="btn btn-secondary" id="btnKpiSelectNone">Tout décocher</button>
            <button class="btn btn-secondary" id="btnKpiWeek">Modèle "semaine"</button>
          </div>
        </div>

      </main>
    </div>
  </div>
  <script defer src="/static/js/sidebar.js?v=2000"></script>

  <script defer src="/static/js/v8-features.js?v=2100"></script>
  <script defer src="/static/js/help-shortcut.js?v=2000"></script>
  <script defer src="/static/js/app.js?v=2103"></script>
  <script defer src="/static/js/page-kpi.js?v=2000"></script>

</body>
</html>
