<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="Prosp'Up — CRM Prospection B2B par Up Technologies. Gestion de prospects, suivi des relances et pilotage commercial.">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="icon" href="/static/favicon.ico">
  <title>Prosp'Up — Référentiel Métiers</title>
<link rel="stylesheet" href="/static/css/style.css?v=2103">
  <style>
    .tree-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .tree-controls button {
      padding: 7px 16px; border-radius: 10px; border: 1px solid var(--color-border);
      background: var(--color-surface); color: var(--color-text); cursor: pointer;
      font-size: 12.5px; font-weight: 500; transition: all .2s; backdrop-filter: blur(8px);
    }
    .tree-controls button:hover { background: var(--color-primary); color: #fff; border-color: var(--color-primary); box-shadow: 0 4px 16px rgba(var(--color-primary-rgb),.3); }
    .tree-search {
      flex: 1; min-width: 220px; padding: 9px 16px; border-radius: 10px;
      border: 1px solid var(--color-border); background: var(--color-surface);
      color: var(--color-text); font-size: 13px; outline: none; transition: all .25s;
    }
    .tree-search:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb),.12); }
    .tree-search::placeholder { color: var(--color-text-secondary); }
    .stats-strip { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .stat-chip {
      display: flex; align-items: center; gap: 10px; padding: 10px 18px;
      background: var(--color-surface); border-radius: 12px; border: 1px solid var(--color-border);
      font-size: 13px; backdrop-filter: blur(12px); box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .stat-chip-value { font-weight: 700; font-size: 20px; color: var(--color-primary); }
    @media (prefers-color-scheme: dark) { .stat-chip { background: rgba(17,24,38,.7); } }
    .legend-bar {
      display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; padding: 10px 16px;
      border-radius: 10px; font-size: 12px; background: var(--color-surface);
      border: 1px solid var(--color-border); color: var(--color-text-secondary);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .tree-root { list-style: none; padding: 0; margin: 0; }
    .tree-node { margin-bottom: 6px; }
    .cat-card {
      border-radius: 14px; overflow: hidden; border: 1px solid var(--color-border);
      background: var(--color-surface); backdrop-filter: blur(12px);
      box-shadow: 0 2px 10px rgba(0,0,0,.05); transition: box-shadow .25s;
    }
    .cat-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.1); }
    .cat-header {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      cursor: pointer; user-select: none; transition: background .2s;
    }
    .cat-header:hover { background: rgba(var(--color-primary-rgb),.04); }
    .cat-icon {
      font-size: 24px; width: 42px; height: 42px; display: flex; align-items: center;
      justify-content: center; border-radius: 12px; flex-shrink: 0;
    }
    .cat-name { flex: 1; font-size: 16px; font-weight: 700; }
    .cat-count {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
      background: var(--color-surface-2); color: var(--color-text-secondary);
    }
    .cat-chevron {
      font-size: 12px; transition: transform .3s cubic-bezier(.4,0,.2,1);
      width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; background: var(--color-surface-2); flex-shrink: 0;
    }
    .cat-header.open .cat-chevron { transform: rotate(90deg); background: var(--color-primary); color: #fff; }
    .cat-children {
      overflow: hidden; max-height: 0; transition: max-height .4s cubic-bezier(.4,0,.2,1), opacity .3s;
      opacity: 0; list-style: none; padding: 0;
    }
    .cat-children.expanded { max-height: 8000px; opacity: 1; }
    .spec-row {
      display: flex; align-items: center; gap: 10px; padding: 11px 18px 11px 30px;
      cursor: pointer; user-select: none; border-top: 1px solid rgba(128,128,128,.08); transition: background .15s;
    }
    .spec-row:hover { background: rgba(var(--color-primary-rgb),.04); }
    .spec-row.open { background: rgba(var(--color-primary-rgb),.06); }
    .spec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: transform .2s; }
    .spec-row.open .spec-dot { transform: scale(1.4); }
    .spec-name { flex: 1; font-size: 13.5px; font-weight: 500; }
    .spec-count {
      font-size: 10.5px; padding: 2px 8px; border-radius: 16px;
      background: var(--color-surface-2); color: var(--color-text-secondary); font-weight: 600;
    }
    .spec-chevron { font-size: 10px; transition: transform .25s cubic-bezier(.4,0,.2,1); color: var(--color-text-secondary); }
    .spec-row.open .spec-chevron { transform: rotate(90deg); color: var(--color-primary); }
    .spec-detail {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height .35s cubic-bezier(.4,0,.2,1), opacity .3s, padding .3s;
      padding: 0 18px 0 46px; margin: 0;
    }
    .spec-detail.visible { max-height: 3000px; opacity: 1; padding: 14px 18px 18px 46px; }
    .detail-glass {
      background: var(--color-surface-2); border-radius: 12px; border: 1px solid var(--color-border);
      padding: 16px 20px; backdrop-filter: blur(8px);
    }
    @media (prefers-color-scheme: dark) { .detail-glass { background: rgba(15,23,35,.6); } }
    .detail-ops {
      font-size: 13px; color: var(--color-text-secondary); line-height: 1.6;
      margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border);
    }
    .detail-section { margin-bottom: 12px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-section-title {
      font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--color-primary); margin-bottom: 6px;
    }
    .mtag-group { display: flex; flex-wrap: wrap; gap: 4px; }
    .mtag-badge {
      display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 11px;
      background: var(--color-surface); color: var(--color-text);
      border: 1px solid var(--color-border); transition: all .15s;
    }
    .mtag-badge:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .sector-badge {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px;
      border-radius: 6px; font-size: 11px; background: rgba(var(--color-primary-rgb),.08);
      color: var(--color-primary); border: 1px solid rgba(var(--color-primary-rgb),.2);
    }
    .sector-norm { font-size: 10px; color: var(--color-text-secondary); font-style: italic; }
    .certif-badge {
      display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 11px;
      background: rgba(245,158,11,.1); color: var(--color-warning); border: 1px solid rgba(245,158,11,.2);
    }
    .tree-node.search-hidden { display: none; }
    .spec-row.search-match { background: rgba(var(--color-primary-rgb),.08); }
  </style>
</head>
<body data-page="metiers">
  <div class="container">
    <header>
      <h1><img src="/static/logo-up-technologies.png" alt="Up Technologies" class="header-logo-app"> Prosp'Up — Référentiel Métiers</h1>
      <p class="header-subtitle">Arbre des métiers, spécialités & compétences — Up Technologies</p>
    </header>
    <div class="main-layout">
                        <aside class="sidebar"></aside>
      <main class="content">
        <div class="stats-strip" id="statsStrip"></div>
        <div class="tree-controls">
          <input type="text" class="tree-search" id="treeSearch" placeholder="🔍 Rechercher un métier, une compétence, un outil… (Ctrl+K)">
          <button onclick="expandAll()">📂 Tout déplier</button>
          <button onclick="collapseAll()">📁 Tout replier</button>
          <button onclick="toggleAddPanel()" style="background:var(--color-primary);color:#fff;border-color:var(--color-primary);">➕ Ajouter</button>
        </div>

        <!-- Panel d'ajout -->
        <div id="addMetierPanel" class="card" style="display:none;margin-bottom:14px;padding:16px;">
          <div style="font-weight:700;margin-bottom:10px;">➕ Ajouter au référentiel</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:end;">
            <div>
              <label style="font-size:11px;display:block;margin-bottom:2px;">Type</label>
              <select id="addMetierType" style="padding:7px 10px;border-radius:8px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:12px;" onchange="updateAddOptions()">
                <option value="tech">Compétence (tag)</option>
                <option value="specialty">Spécialité</option>
                <option value="sector">Secteur</option>
              </select>
            </div>
            <div>
              <label style="font-size:11px;display:block;margin-bottom:2px;">Catégorie</label>
              <select id="addMetierCat" style="padding:7px 10px;border-radius:8px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:12px;min-width:180px;"></select>
            </div>
            <div id="addMetierSpecWrap">
              <label style="font-size:11px;display:block;margin-bottom:2px;">Spécialité</label>
              <select id="addMetierSpec" style="padding:7px 10px;border-radius:8px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:12px;min-width:180px;"></select>
            </div>
            <div id="addMetierGroupWrap">
              <label style="font-size:11px;display:block;margin-bottom:2px;">Groupe tech</label>
              <input id="addMetierGroup" type="text" placeholder="ex: Langages" style="padding:7px 10px;border-radius:8px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:12px;width:140px;">
            </div>
            <div style="flex:1;min-width:200px;">
              <label style="font-size:11px;display:block;margin-bottom:2px;">Valeur</label>
              <input id="addMetierValue" type="text" placeholder="ex: Rust, IoT avancé…" style="padding:7px 10px;border-radius:8px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:12px;width:100%;">
            </div>
            <button onclick="submitCustomMetier()" style="padding:7px 16px;border-radius:8px;background:var(--color-primary);color:#fff;border:none;cursor:pointer;font-weight:600;">✅ Ajouter</button>
          </div>
          <div id="addMetierMsg" class="muted" style="margin-top:6px;font-size:11px;"></div>
        </div>

        <!-- Custom metiers list -->
        <div id="customMetiersList" style="display:none;margin-bottom:14px;"></div>
        <div class="legend-bar">
          <div class="legend-item"><div class="legend-dot" style="background:var(--color-primary)"></div> Catégorie</div>
          <div class="legend-item"><span class="mtag-badge" style="font-size:9px;padding:1px 5px;">tag</span> Compétence</div>
          <div class="legend-item"><span class="sector-badge" style="font-size:9px;padding:1px 5px;">sec</span> Secteur</div>
          <div class="legend-item"><span class="certif-badge" style="font-size:9px;padding:1px 5px;">cert</span> Certification</div>
        </div>
        <ul class="tree-root" id="treeRoot"></ul>
      </main>
    </div>
  </div>
  <script defer src="/static/js/sidebar.js?v=2000"></script>
<script defer src="/static/js/v8-features.js?v=2100"></script>
  <script defer src="/static/js/help-shortcut.js?v=2000"></script>
  <script defer src="/static/js/metiers-data.js?v=2000"></script>
<script>
const root = document.getElementById('treeRoot');
function renderStats() {
  const totalSpecs = METIERS_DATA.reduce((s, m) => s + m.specialties.length, 0);
  const allTech = new Set();
  METIERS_DATA.forEach(m => m.specialties.forEach(sp => { Object.values(sp.tech).forEach(arr => arr.forEach(t => allTech.add(t))); }));
  document.getElementById('statsStrip').innerHTML =
    `<div class="stat-chip"><span class="stat-chip-value">${METIERS_DATA.length}</span> Catégories</div>` +
    `<div class="stat-chip"><span class="stat-chip-value">${totalSpecs}</span> Spécialités</div>` +
    `<div class="stat-chip"><span class="stat-chip-value">${allTech.size}</span> Compétences</div>` +
    `<div class="stat-chip"><span class="stat-chip-value">${Object.keys(SECTORS_DATA).length}</span> Secteurs</div>`;
}
function renderTree() {
  root.innerHTML = '';
  METIERS_DATA.forEach((metier, mi) => {
    const li = document.createElement('li');
    li.className = 'tree-node'; li.dataset.level = '0'; li.dataset.searchText = metier.name.toLowerCase();
    let specHtml = '';
    metier.specialties.forEach((spec, si) => {
      const specId = 'spec-' + mi + '-' + si;
      const techEntries = Object.entries(spec.tech).filter(function(e){ return e[1].length > 0; });
      const techCount = techEntries.reduce(function(s, e){ return s + e[1].length; }, 0);
      const searchParts = [spec.name, spec.ops || ''];
      techEntries.forEach(function(e){ searchParts.push(e[0]); e[1].forEach(function(t){ searchParts.push(t); }); });
      if (spec.sectors) spec.sectors.forEach(function(s){ searchParts.push(s); });
      if (spec.certifs) spec.certifs.forEach(function(c){ searchParts.push(c); });
      let detailHtml = '<div class="detail-glass">';
      if (spec.ops) detailHtml += '<div class="detail-ops">📋 ' + spec.ops + '</div>';
      techEntries.forEach(function(entry) {
        detailHtml += '<div class="detail-section"><div class="detail-section-title">🔹 ' + entry[0] + '</div><div class="mtag-group">';
        entry[1].forEach(function(t){ detailHtml += '<span class="mtag-badge">' + t + '</span>'; });
        detailHtml += '</div></div>';
      });
      if (spec.sectors && spec.sectors.length) {
        detailHtml += '<div class="detail-section"><div class="detail-section-title">🏭 Secteurs</div><div class="mtag-group">';
        spec.sectors.forEach(function(s){
          var n = SECTORS_DATA[s];
          detailHtml += '<span class="sector-badge">' + s + (n ? ' <span class="sector-norm">(' + n + ')</span>' : '') + '</span>';
        });
        detailHtml += '</div></div>';
      }
      if (spec.certifs && spec.certifs.length) {
        detailHtml += '<div class="detail-section"><div class="detail-section-title">🎓 Certifications</div><div class="mtag-group">';
        spec.certifs.forEach(function(c){ detailHtml += '<span class="certif-badge">' + c + '</span>'; });
        detailHtml += '</div></div>';
      }
      detailHtml += '</div>';
      specHtml += '<li class="tree-node" data-level="1" data-search-text="' + searchParts.join(' ').toLowerCase().replace(/"/g, '') + '">' +
        '<div class="spec-row" onclick="toggleSpec(this,\'' + specId + '\')">' +
          '<span class="spec-dot" style="background:' + metier.color + '"></span>' +
          '<span class="spec-name">' + spec.name + '</span>' +
          '<span class="spec-count">' + techCount + '</span>' +
          '<span class="spec-chevron">▶</span>' +
        '</div>' +
        '<div class="spec-detail" id="' + specId + '">' + detailHtml + '</div>' +
      '</li>';
    });
    li.innerHTML = '<div class="cat-card">' +
      '<div class="cat-header" onclick="toggleCat(this)">' +
        '<div class="cat-icon" style="background:' + metier.color + '15;color:' + metier.color + ';">' + metier.icon + '</div>' +
        '<span class="cat-name">' + metier.name + '</span>' +
        '<span class="cat-count">' + metier.specialties.length + ' spécialités</span>' +
        '<span class="cat-chevron">▶</span>' +
      '</div>' +
      '<ul class="cat-children">' + specHtml + '</ul>' +
    '</div>';
    root.appendChild(li);
  });
}
function toggleCat(header) { header.classList.toggle('open'); var c = header.nextElementSibling; if (c) c.classList.toggle('expanded'); }
function toggleSpec(row, specId) { row.classList.toggle('open'); var p = document.getElementById(specId); if (p) p.classList.toggle('visible'); }
function expandAll() {
  document.querySelectorAll('.cat-header').forEach(function(h){ h.classList.add('open'); });
  document.querySelectorAll('.cat-children').forEach(function(c){ c.classList.add('expanded'); });
  document.querySelectorAll('.spec-row').forEach(function(r){ r.classList.add('open'); });
  document.querySelectorAll('.spec-detail').forEach(function(p){ p.classList.add('visible'); });
}
function collapseAll() {
  document.querySelectorAll('.cat-header').forEach(function(h){ h.classList.remove('open'); });
  document.querySelectorAll('.cat-children').forEach(function(c){ c.classList.remove('expanded'); });
  document.querySelectorAll('.spec-row').forEach(function(r){ r.classList.remove('open'); });
  document.querySelectorAll('.spec-detail').forEach(function(p){ p.classList.remove('visible'); });
}
var searchTimeout;
document.getElementById('treeSearch').addEventListener('input', function() {
  clearTimeout(searchTimeout); var self = this;
  searchTimeout = setTimeout(function(){ filterTree(self.value); }, 200);
});
function filterTree(query) {
  var q = query.trim().toLowerCase();
  if (!q) {
    document.querySelectorAll('.tree-node').forEach(function(n){ n.classList.remove('search-hidden'); });
    document.querySelectorAll('.spec-row').forEach(function(r){ r.classList.remove('search-match'); });
    return;
  }
  var matchingCats = new Set();
  document.querySelectorAll('.tree-node[data-level="1"]').forEach(function(node) {
    if ((node.dataset.searchText || '').includes(q)) {
      node.classList.remove('search-hidden');
      var sr = node.querySelector('.spec-row'); if (sr) sr.classList.add('search-match');
      if (sr) sr.classList.add('open');
      var d = node.querySelector('.spec-detail'); if (d) d.classList.add('visible');
      matchingCats.add(node.closest('.tree-node[data-level="0"]'));
    } else {
      node.classList.add('search-hidden');
      var sr2 = node.querySelector('.spec-row'); if (sr2) sr2.classList.remove('search-match');
    }
  });
  document.querySelectorAll('.tree-node[data-level="0"]').forEach(function(node) {
    if ((node.dataset.searchText || '').includes(q)) matchingCats.add(node);
  });
  document.querySelectorAll('.tree-node[data-level="0"]').forEach(function(node) {
    if (matchingCats.has(node)) {
      node.classList.remove('search-hidden');
      var h = node.querySelector('.cat-header'); if (h) h.classList.add('open');
      var c = node.querySelector('.cat-children'); if (c) c.classList.add('expanded');
    } else { node.classList.add('search-hidden'); }
  });
}
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('treeSearch').focus(); }
});
renderStats(); renderTree();

// ═══ Custom Métiers Editing ═══
let _customMetiers = [];

function toggleAddPanel() {
  const p = document.getElementById('addMetierPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if (p.style.display === 'block') updateAddOptions();
}

function updateAddOptions() {
  const type = document.getElementById('addMetierType').value;
  const catSel = document.getElementById('addMetierCat');
  const specWrap = document.getElementById('addMetierSpecWrap');
  const groupWrap = document.getElementById('addMetierGroupWrap');
  
  // Populate categories
  catSel.innerHTML = METIERS_DATA.map(function(m){ return '<option value="' + m.name + '">' + m.icon + ' ' + m.name + '</option>'; }).join('');
  
  if (type === 'tech') {
    specWrap.style.display = ''; groupWrap.style.display = '';
    updateSpecOptions();
  } else if (type === 'specialty') {
    specWrap.style.display = 'none'; groupWrap.style.display = 'none';
  } else { // sector
    specWrap.style.display = ''; groupWrap.style.display = 'none';
    updateSpecOptions();
  }
}

function updateSpecOptions() {
  var catName = document.getElementById('addMetierCat').value;
  var cat = METIERS_DATA.find(function(m){ return m.name === catName; });
  var specSel = document.getElementById('addMetierSpec');
  if (cat) {
    specSel.innerHTML = cat.specialties.map(function(s){ return '<option value="' + s.name + '">' + s.name + '</option>'; }).join('');
  }
}

document.getElementById('addMetierCat').addEventListener('change', updateSpecOptions);

async function submitCustomMetier() {
  var type = document.getElementById('addMetierType').value;
  var cat = document.getElementById('addMetierCat').value;
  var spec = document.getElementById('addMetierSpec')?.value || '';
  var group = document.getElementById('addMetierGroup')?.value?.trim() || '';
  var value = document.getElementById('addMetierValue').value.trim();
  var msg = document.getElementById('addMetierMsg');
  
  if (!value) { msg.textContent = '⚠️ Veuillez saisir une valeur'; return; }
  
  try {
    var res = await fetch('/api/custom_metiers', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type: type, category: cat, specialty: spec, tech_group: group || null, value: value })
    });
    var json = await res.json();
    if (json.ok) {
      msg.textContent = '✅ Ajouté : ' + value;
      document.getElementById('addMetierValue').value = '';
      await loadCustomMetiers();
    } else {
      msg.textContent = '❌ ' + (json.error === 'duplicate' ? 'Déjà existant' : json.error);
    }
  } catch(e) { msg.textContent = '❌ Erreur réseau'; }
}

async function deleteCustomMetier(id) {
  if (!confirm('Supprimer cet élément custom ?')) return;
  try {
    await fetch('/api/custom_metiers/' + id, { method: 'DELETE' });
    await loadCustomMetiers();
  } catch(e) { alert('Erreur'); }
}

async function loadCustomMetiers() {
  try {
    var res = await fetch('/api/custom_metiers');
    var json = await res.json();
    _customMetiers = json.items || [];
    renderCustomList();
    mergeCustomIntoTree();
  } catch(e) { console.error(e); }
}

function renderCustomList() {
  var el = document.getElementById('customMetiersList');
  if (!_customMetiers.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = '<div class="card" style="padding:12px;">' +
    '<div style="font-weight:700;margin-bottom:8px;">🔧 Éléments personnalisés <span class="muted">(' + _customMetiers.length + ')</span></div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
    _customMetiers.map(function(m) {
      var label = m.type === 'tech' ? '🏷️' : (m.type === 'specialty' ? '📂' : '🏭');
      return '<span class="mtag-badge" style="background:rgba(var(--color-primary-rgb),.15);border:1px solid rgba(var(--color-primary-rgb),.3);cursor:pointer;" title="' +
        m.category + (m.specialty ? ' > ' + m.specialty : '') + (m.tech_group ? ' > ' + m.tech_group : '') +
        '\nCliquer pour supprimer" onclick="deleteCustomMetier(' + m.id + ')">' +
        label + ' ' + m.value + ' ✕</span>';
    }).join('') +
    '</div></div>';
}

function mergeCustomIntoTree() {
  // Re-render tree with custom items merged
  renderTree();
  renderStats();
}

// Override renderTree to include custom items
var _origRenderTree = renderTree;
renderTree = function() {
  // Merge custom techs into METIERS_DATA temporarily for display
  _customMetiers.forEach(function(cm) {
    var cat = METIERS_DATA.find(function(m){ return m.name === cm.category; });
    if (!cat) return;
    if (cm.type === 'tech' && cm.specialty) {
      var spec = cat.specialties.find(function(s){ return s.name === cm.specialty; });
      if (spec && cm.tech_group) {
        if (!spec.tech[cm.tech_group]) spec.tech[cm.tech_group] = [];
        if (!spec.tech[cm.tech_group].includes(cm.value)) spec.tech[cm.tech_group].push(cm.value);
      }
    } else if (cm.type === 'sector' && cm.specialty) {
      var spec2 = cat.specialties.find(function(s){ return s.name === cm.specialty; });
      if (spec2) {
        if (!spec2.sectors) spec2.sectors = [];
        if (!spec2.sectors.includes(cm.value)) spec2.sectors.push(cm.value);
      }
    }
  });
  _origRenderTree();
};

// Load on init
loadCustomMetiers();

document.querySelectorAll('.nav-button').forEach(function(btn) {
  btn.classList.remove('active');
  if (btn.getAttribute('href') === '/metiers') btn.classList.add('active');
});
</script>
