<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Prosp'Up — Mode Prosp</title>
<link rel="stylesheet" href="/static/css/mode-prosp.css?v={{ static_hash('css/mode-prosp.css') }}">
<link rel="icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body class="mode-prosp-body" data-page="mode-prosp">

<div class="mp-container">
    <!-- Header -->
    <header class="mp-header">
        <div class="mp-header-left">
            <img src="/static/logo-up-technologies.png" alt="Up Technologies" class="mp-logo">
            <span class="mp-title">Mode Prosp</span>
        </div>
        <div class="mp-header-center">
            <span class="mp-counter" id="mpCounter">0 / 0</span>
        </div>
        <div class="mp-header-right">
            <button class="mp-close-btn" onclick="mpClose()" title="Fermer cet onglet">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Fermer
            </button>
        </div>
    </header>

    <!-- Deck stage : ghost cards + viewport + side arrows -->
    <div class="mp-deck-stage">
        <!-- Ghost cards (effet de pile, purement décoratif) -->
        <div class="mp-ghost mp-ghost-2" aria-hidden="true"></div>
        <div class="mp-ghost mp-ghost-1" aria-hidden="true"></div>

        <!-- Card viewport — le JS injecte .mp-card ici -->
        <div class="mp-viewport" id="mpViewport"></div>

        <!-- Flèche gauche -->
        <button class="mp-arrow mp-arrow-prev" id="mpPrev" onclick="mpNavigate(-1)" title="Prospect précédent (←)" aria-label="Prospect précédent">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>

        <!-- Flèche droite -->
        <button class="mp-arrow mp-arrow-next" id="mpNext" onclick="mpNavigate(1)" title="Prospect suivant (→)" aria-label="Prospect suivant">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
    </div>

    <!-- Progress strip (dots de pagination) -->
    <div class="mp-progress-strip">
        <div class="mp-progress-bar" id="mpProgressBar">
          <div class="mp-progress-fill" id="mpProgressFill" style="width: 0%"></div>
        </div>
        <div class="mp-nav-dots" id="mpDots"></div>
    </div>
</div>

<script defer src="/static/js/mode-prosp-tab.js?v={{ static_hash('js/mode-prosp-tab.js') }}"></script>
</body>
</html>
