<!DOCTYPE html>
<html lang="fr" data-v30>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F6F4EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Prosp'Up v30 — Mode Prosp</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/static/css/v30/tokens.css?v={{ static_hash('css/v30/tokens.css') }}">
<link rel="stylesheet" href="/static/css/v30/components.css?v={{ static_hash('css/v30/components.css') }}">
<link rel="stylesheet" href="/static/css/v30/patterns.css?v={{ static_hash('css/v30/patterns.css') }}">
<link rel="stylesheet" href="/static/css/v30/mode_prosp.css?v={{ static_hash('css/v30/mode_prosp.css') }}">
<link rel="stylesheet" href="/static/css/v30/push-modal.css?v={{ static_hash('css/v30/push-modal.css') }}">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body class="mode-prosp-body" data-page="v30-mode-prosp">
<script>(function(){try{if(localStorage.getItem('mp-dark')==='1')document.body.classList.add('mp-dark');}catch(e){}})();</script>

<div class="mp-shell">

  <!-- TOPBAR (h: 52px) -->
  <header class="mp-topbar">
    <div class="mp-topbar-brand">
      <div class="mp-logo">P</div>
      <span class="mp-topbar-app">PROSP'UP</span>
      <span class="mp-topbar-sep">›</span>
      <span class="mp-topbar-mode">Mode Prosp</span>
    </div>

    <div class="mp-topbar-nav" id="mpTopbarNav">
      <button class="mp-nav-arrow" id="mpPrev" onclick="mpNavigate(-1)" title="Précédent (←)" aria-label="Prospect précédent" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="mp-pager">
        <span class="mp-pager-current" id="mpCounterNum">1</span>
        <span class="mp-pager-sep">/ <span id="mpCounterTotal">0</span></span>
      </div>
      <div class="mp-progress-track"><div class="mp-progress-fill" id="mpProgressFill" style="width:0%"></div></div>
      <button class="mp-nav-arrow" id="mpNext" onclick="mpNavigate(1)" title="Suivant (→)" aria-label="Prospect suivant" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="mp-topbar-right">
      <button class="mp-cmd-pill">
        <kbd>⌘K</kbd>
        <span class="mp-cmd-hint">Commande…</span>
      </button>
      <button class="mp-theme-btn" id="mpThemeToggle" onclick="mpToggleDarkMode()" title="Mode sombre" aria-label="Basculer le thème">
        <svg class="mp-theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="mp-theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="mp-close-btn" onclick="mpClose()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        Fermer
      </button>
    </div>
  </header>

  <!-- BODY (rail + viewport) -->
  <div class="mp-body">

    <!-- ACTION RAIL (76px) -->
    <nav class="mp-rail" aria-label="Actions rapides">
      <button class="mp-rail-btn mp-rail-call" onclick="mpRailCall()" title="Appeler (C)">
        <span class="mp-rail-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </span>
        <span class="mp-rail-label">Appeler</span>
        <kbd class="mp-rail-kbd">C</kbd>
      </button>
      <button class="mp-rail-btn" onclick="mpRailEmail()" title="Email (M)">
        <span class="mp-rail-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
        </span>
        <span class="mp-rail-label">Email</span>
        <kbd class="mp-rail-kbd">M</kbd>
      </button>
      <button class="mp-rail-btn" onclick="mpRailLinkedIn()" title="LinkedIn (L)">
        <span class="mp-rail-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM5 8H0v15h5V8zm7.98 0H8.02v15h4.96v-7.88c0-4.62 6-5 6 0V23H24v-9.62c0-7.71-8.79-7.43-11.02-3.64V8z"/></svg>
        </span>
        <span class="mp-rail-label">LinkedIn</span>
        <kbd class="mp-rail-kbd">L</kbd>
      </button>
      <button class="mp-rail-btn mp-rail-ia" onclick="mpRailIA()" title="Demander à l'IA (I)">
        <span class="mp-rail-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/></svg>
        </span>
        <span class="mp-rail-label">IA</span>
        <kbd class="mp-rail-kbd">I</kbd>
      </button>
      <div class="mp-rail-sep" aria-hidden="true"></div>
      <button class="mp-rail-btn" onclick="mpRailNote()" title="Ajouter une note (N)">
        <span class="mp-rail-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>
        </span>
        <span class="mp-rail-label">Note</span>
        <kbd class="mp-rail-kbd">N</kbd>
      </button>
      <button class="mp-rail-btn" onclick="mpRailStatus()" title="Changer le statut (S)">
        <span class="mp-rail-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </span>
        <span class="mp-rail-label">Statut</span>
        <kbd class="mp-rail-kbd">S</kbd>
      </button>
      <div class="mp-rail-spacer" aria-hidden="true"></div>
      <button class="mp-rail-btn mp-rail-save" onclick="mpSaveCard()" title="Enregistrer (↵)">
        <span class="mp-rail-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m5 12 5 5L20 7"/></svg>
        </span>
        <span class="mp-rail-label">Sauver</span>
        <kbd class="mp-rail-kbd">↵</kbd>
      </button>
    </nav>

    <!-- DYNAMIC VIEWPORT (per prospect) -->
    <div class="mp-viewport" id="mpViewport">
      <div class="mp-empty-state">Chargement…</div>
    </div>

  </div><!-- /.mp-body -->

  <!-- COMMAND BAR (h: 40px) -->
  <footer class="mp-cmdbar">
    <span class="mp-cmdbar-brand">Commande —</span>
    <div class="mp-cmdbar-hint">
      <kbd>⌘</kbd><kbd>K</kbd>
      <span class="mp-cmdbar-hint-text">tape pour rechercher, statuer, naviguer…</span>
    </div>
    <div class="mp-cmdbar-shortcuts">
      <span class="mp-sc-item"><kbd class="mp-kbd">←/→</kbd><em>Naviguer</em></span>
      <span class="mp-sc-item"><kbd class="mp-kbd">1—7</kbd><em>Statut direct</em></span>
      <span class="mp-sc-item"><kbd class="mp-kbd">N</kbd><em>Note</em></span>
      <span class="mp-sc-item"><kbd class="mp-kbd">↵</kbd><em>Sauvegarder</em></span>
      <span class="mp-sc-item"><kbd class="mp-kbd">Esc</kbd><em>Fermer</em></span>
    </div>
  </footer>

</div><!-- /.mp-shell -->

<script defer src="/static/js/v30/toast.js?v={{ static_hash('js/v30/toast.js') }}"></script>
<script defer src="/static/js/v30/ollama.js?v={{ static_hash('js/v30/ollama.js') }}"></script>
<script defer src="/static/js/v30/push-modal.js?v={{ static_hash('js/v30/push-modal.js') }}"></script>
<script defer src="/static/js/v30/mode_prosp.js?v={{ static_hash('js/v30/mode_prosp.js') }}"></script>
</body>
</html>
