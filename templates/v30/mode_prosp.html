<!DOCTYPE html>
<html lang="fr" data-v30 data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Prosp'Up v30 — Mode Prosp</title>

{# Theme init (cohérent avec base.html) #}
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.dataset.theme = t;
      }
    } catch (e) {}
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/static/css/v30/tokens.css?v={{ static_hash('css/v30/tokens.css') }}">
<link rel="stylesheet" href="/static/css/v30/components.css?v={{ static_hash('css/v30/components.css') }}">
<link rel="stylesheet" href="/static/css/v30/patterns.css?v={{ static_hash('css/v30/patterns.css') }}">
<link rel="stylesheet" href="/static/css/v30/mode_prosp.css?v={{ static_hash('css/v30/mode_prosp.css') }}">
<link rel="stylesheet" href="/static/css/v30/push-modal.css?v={{ static_hash('css/v30/push-modal.css') }}">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body class="mode-prosp-body" data-page="v30-mode-prosp">

<div class="mp-container">
    <header class="mp-header">
        <div class="mp-header-left">
            <div class="v30-topbar__brand">
                <span class="v30-logo" aria-hidden="true">P</span>
                <nav class="v30-crumbs" aria-label="Fil d'Ariane">
                    <a class="v30-crumbs__item v30-crumbs__item--link" href="/v30/prospects">Prosp'Up</a>
                    <span class="v30-crumbs__sep">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
                    </span>
                    <span class="v30-crumbs__item is-current">Mode Prosp</span>
                </nav>
            </div>
        </div>
        <div class="mp-header-center">
            <span class="mp-counter" id="mpCounter">0 / 0</span>
        </div>
        <div class="mp-header-right">
            <button class="mp-close-btn" onclick="mpClose()" title="Fermer cet onglet">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Fermer
            </button>
        </div>
    </header>

    <div class="mp-deck-stage">
        <div class="mp-ghost mp-ghost-2" aria-hidden="true"></div>
        <div class="mp-ghost mp-ghost-1" aria-hidden="true"></div>

        <div class="mp-viewport" id="mpViewport"></div>

        <button class="mp-arrow mp-arrow-prev" id="mpPrev" onclick="mpNavigate(-1)" title="Prospect précédent (←)" aria-label="Prospect précédent">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>

        <button class="mp-arrow mp-arrow-next" id="mpNext" onclick="mpNavigate(1)" title="Prospect suivant (→)" aria-label="Prospect suivant">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
    </div>

    <div class="mp-progress-strip">
        <div class="mp-progress-bar" id="mpProgressBar">
          <div class="mp-progress-fill" id="mpProgressFill" style="width: 0%"></div>
        </div>
        <div class="mp-nav-dots" id="mpDots"></div>
    </div>
</div>

<script defer src="/static/js/v30/toast.js?v={{ static_hash('js/v30/toast.js') }}"></script>
<script defer src="/static/js/v30/push-modal.js?v={{ static_hash('js/v30/push-modal.js') }}"></script>
<script defer src="/static/js/v30/mode_prosp.js?v={{ static_hash('js/v30/mode_prosp.js') }}"></script>
</body>
</html>
