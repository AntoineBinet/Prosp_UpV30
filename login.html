<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>ProspUp — Connexion</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="icon" href="/static/favicon.ico">
<script>(function(){try{var m=localStorage.getItem('m26.theme');if(m==='dark'||m==='light')document.documentElement.setAttribute('data-theme',m);}catch(e){}})();</script>
<style>
/* Mobile 2026 login — OLED dark-first with ambient orange orbs */
*{margin:0;padding:0;box-sizing:border-box}
:root,html[data-theme="dark"]{
  --bg:#000;--card:#121217;--input:#1C1C22;--border:rgba(255,255,255,.06);
  --text:#F5F5F7;--muted:rgba(235,235,245,.6);--muted2:rgba(235,235,245,.35);
  --accent:#FF6B35;--accent2:#FF8C42;
}
html[data-theme="light"]{
  --bg:#F6F5F2;--card:#FFFFFF;--input:#F0EFEB;--border:rgba(0,0,0,.06);
  --text:#1A1916;--muted:rgba(60,60,67,.65);--muted2:rgba(60,60,67,.35);
  --accent:#FF6B35;--accent2:#FF8C42;
}
@media(prefers-color-scheme:light){html:not([data-theme]){
  --bg:#F6F5F2;--card:#FFFFFF;--input:#F0EFEB;--border:rgba(0,0,0,.06);
  --text:#1A1916;--muted:rgba(60,60,67,.65);--muted2:rgba(60,60,67,.35);
}}

html,body{min-height:100vh}
body{
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:var(--bg);color:var(--text);padding:24px;
  position:relative;overflow-x:hidden;
}

/* Ambient orbs (top + bottom-right) */
.orb-top{
  position:absolute;top:60px;left:-20%;width:140%;height:380px;
  background:radial-gradient(ellipse at center,rgba(255,107,53,.28) 0%,rgba(255,107,53,0) 60%);
  filter:blur(20px);pointer-events:none;z-index:0;
}
.orb-bot{
  position:absolute;bottom:80px;right:-30%;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,140,66,.15) 0%,rgba(255,140,66,0) 70%);
  filter:blur(40px);pointer-events:none;z-index:0;
}

.login-shell{width:100%;max-width:420px;position:relative;z-index:1}

/* Brand lock-up */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:48px}
.brand-mark{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(255,107,53,.35);
  color:#fff;font-weight:800;font-size:20px;letter-spacing:-.5px;
}
.brand-name{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

/* Welcome */
.welcome{margin-bottom:40px}
.welcome h1{font-size:32px;font-weight:700;letter-spacing:-.8px;color:var(--text);line-height:1.1;margin:0}
.welcome h1 .accent{color:var(--accent)}
.welcome p{margin-top:10px;font-size:15px;color:var(--muted);line-height:1.4;letter-spacing:-.1px}

/* Field blocks (iOS-ish inset with eyebrow label) */
.field{
  display:flex;align-items:center;gap:12px;
  min-height:56px;padding:0 16px;
  background:var(--card);border-radius:16px;border:.5px solid var(--border);
  margin-bottom:10px;transition:border-color .15s, box-shadow .15s;
}
.field:focus-within{border-color:rgba(255,107,53,.45);box-shadow:0 0 0 3px rgba(255,107,53,.12)}
.field-ico{color:var(--muted2);display:flex;align-items:center;flex-shrink:0}
.field-ico svg{width:18px;height:18px}
.field-body{flex:1;min-width:0;padding:10px 0}
.field-label{font-size:11px;color:var(--muted2);letter-spacing:.3px;text-transform:uppercase;font-weight:500}
.field-input{
  display:block;width:100%;background:transparent;border:none;outline:none;
  color:var(--text);font-family:inherit;font-size:16px;font-weight:500;
  letter-spacing:-.2px;margin-top:2px;padding:0;
}
.field-input::placeholder{color:var(--muted2)}
.pw-toggle{
  background:none;border:none;cursor:pointer;color:var(--muted);
  padding:6px;border-radius:6px;line-height:1;font-size:0;
}
.pw-toggle:hover{color:var(--text)}

.forgot{display:flex;justify-content:flex-end;margin-top:2px;margin-bottom:28px}
.forgot a{font-size:13px;color:var(--accent);font-weight:500;text-decoration:none}

/* Error strip */
.error-msg{
  background:rgba(239,68,68,.12);border:.5px solid rgba(239,68,68,.3);color:#F87171;
  padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;text-align:center;
}
.error-msg.show{display:block}

/* Primary CTA */
.btn-login{
  width:100%;height:54px;border-radius:18px;border:none;
  background:var(--accent);color:#fff;font-family:inherit;
  font-size:16px;font-weight:600;letter-spacing:-.2px;cursor:pointer;
  box-shadow:0 10px 24px rgba(255,107,53,.35),inset 0 1px 0 rgba(255,255,255,.18);
  transition:transform .1s;
}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.loading .btn-login::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.face-hint{
  margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;
  color:var(--muted);font-size:13px;
}
.foot{margin-top:18px;text-align:center;font-size:11px;color:var(--muted2);letter-spacing:.4px}
</style>
</head>
<body>
<div class="orb-top" aria-hidden="true"></div>
<div class="orb-bot" aria-hidden="true"></div>

<div class="login-shell">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true">P</div>
    <div>
      <div class="brand-name">ProspUp</div>
      <div class="brand-sub">Up Technologies</div>
    </div>
  </div>

  <div class="welcome">
    <h1>Bon retour,<br><span class="accent">connecte-toi.</span></h1>
    <p>Reprends ta session Mode Prosp<br>là où tu l'avais laissée.</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm" onsubmit="return doLogin(event)">
    <label class="field">
      <span class="field-ico" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </span>
      <span class="field-body">
        <span class="field-label">Identifiant</span>
        <input class="field-input" type="text" id="username" name="username" placeholder="Votre identifiant" autocomplete="username" required autofocus>
      </span>
    </label>

    <label class="field">
      <span class="field-ico" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 10V7a4 4 0 018 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </span>
      <span class="field-body">
        <span class="field-label">Mot de passe</span>
        <input class="field-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </span>
      <button type="button" class="pw-toggle" id="pwToggle" title="Afficher / masquer" onclick="togglePw()" aria-label="Afficher le mot de passe">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </label>

    <div class="forgot"><a href="#" tabindex="-1">Mot de passe oublié ?</a></div>

    <button type="submit" class="btn-login" id="btnLogin">Se connecter</button>
  </form>

  <div class="face-hint">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M4 7V5a1 1 0 011-1h2M17 4h2a1 1 0 011 1v2M20 17v2a1 1 0 01-1 1h-2M7 20H5a1 1 0 01-1-1v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="9" cy="10.5" r=".8" fill="currentColor"/>
      <circle cx="15" cy="10.5" r=".8" fill="currentColor"/>
      <path d="M12 10v4h-1M10 16c1 .8 3 .8 4 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </svg>
    Face ID disponible
  </div>

  <div class="foot">prospup.work</div>
</div>

<script>
function togglePw() {
    const inp = document.getElementById('password');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    // (icon swap omitted — purely visual; keeps the markup minimal)
}

document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('loginForm');
    if (form && typeof window.initFormValidation === 'function') {
        window.initFormValidation(form, {
            validateOnBlur: true,
            validateOnInput: true,
            fieldOptions: {
                username: { requiredMessage: "L'identifiant est requis" },
                password: { requiredMessage: 'Le mot de passe est requis' }
            }
        });
    }
});

async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errorMsg');
    err.classList.remove('show');
    btn.disabled = true;
    document.body.classList.add('loading');

    try {
        const resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value
            })
        });
        const data = await resp.json();
        if (data.ok) {
            // v30 est l'interface par defaut ; opt-out client via
            // localStorage.prospup_ui_mode === 'v29'.
            var optOut = false;
            try { optOut = localStorage.getItem('prospup_ui_mode') === 'v29'; } catch (_) {}
            var target = optOut ? '/dashboard' : '/v30/dashboard';
            if (data.must_change_password) target = '/parametres?change_password=1';
            window.location.href = target;
        } else {
            err.textContent = (data.error || 'Erreur de connexion');
            err.classList.add('show');
        }
    } catch(ex) {
        err.textContent = 'Erreur réseau';
        err.classList.add('show');
    } finally {
        btn.disabled = false;
        document.body.classList.remove('loading');
    }
}
</script>
</body>
</html>
