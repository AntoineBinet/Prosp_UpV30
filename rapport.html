<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="ProspUp — CRM Prospection B2B par Up Technologies. Gestion de prospects, suivi des relances et pilotage commercial.">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="icon" href="/static/favicon.ico">
  <title>ProspUp — Rapport Hebdomadaire</title>
<link rel="stylesheet" href="/static/css/style.css?v=2103">
  <style>
    .rapport-controls { display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px; }
    .rapport-controls input[type="week"] {
      padding:8px 14px;border-radius:10px;border:1px solid var(--color-border);
      background:var(--color-surface);color:var(--color-text);font-size:13px;
    }
    .rapport-controls .btn { padding:8px 18px;font-size:13px; }

    .rapport-kpi-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px; }
    .rapport-kpi {
      background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px;
      padding:14px;text-align:center;border-top:3px solid var(--kpi-color, var(--color-primary));
    }
    .rapport-kpi-value { font-size:28px;font-weight:800;color:var(--color-text); }
    .rapport-kpi-label { font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-secondary);margin-top:2px; }

    .rapport-section { background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px;padding:16px;margin-bottom:14px; }
    .rapport-section-title { font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px; }

    .rapport-table { width:100%;border-collapse:collapse;font-size:12px; }
    .rapport-table th { text-align:left;padding:6px 8px;color:var(--color-text-secondary);font-weight:600;border-bottom:1px solid var(--color-border); }
    .rapport-table td { padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04); }

    .rapport-stat-bar { display:flex;height:14px;border-radius:7px;overflow:hidden;margin-bottom:8px;background:rgba(255,255,255,.05); }
    .rapport-stat-segment { transition:width .5s ease; }

    .rapport-company-tags { display:flex;flex-wrap:wrap;gap:5px; }
    .rapport-company-tag { font-size:11px;padding:3px 10px;border-radius:15px;background:rgba(var(--color-primary-rgb),.12);color:var(--color-primary);font-weight:500; }

    /* Export markdown preview */
    .rapport-md-preview {
      background:#0d1117;border:1px solid var(--color-border);border-radius:10px;padding:16px;
      font-family:'Courier New',monospace;font-size:12px;white-space:pre-wrap;color:#e6edf3;
      max-height:500px;overflow-y:auto;display:none;
    }

    @media print {
      .sidebar, .rapport-controls, header { display:none !important; }
      .content { margin:0 !important;padding:0 !important; }
      .rapport-section { break-inside:avoid; }
    }
  </style>
</head>
<body data-page="rapport">
  <div class="container">
    <header>
      <h1><img src="/static/logo-up-technologies.png" alt="Up Technologies" class="header-logo-app"> ProspUp — Rapport Hebdomadaire</h1>
      <p class="header-subtitle">Synthèse de votre activité de prospection</p>
    </header>
    <div class="main-layout">
                  <aside class="sidebar"></aside>
      <main class="content">
        <div class="rapport-controls">
          <label style="font-size:13px;font-weight:600;">Semaine :</label>
          <input type="week" id="rapportWeek">
          <button class="btn btn-primary" id="rapportLoad">📊 Générer</button>
          <button class="btn btn-secondary" id="rapportCopyMd">📋 Copier Markdown</button>
          <button class="btn btn-secondary" id="rapportPrint">🖨️ Imprimer</button>
          <button class="btn btn-secondary" id="rapportToggleMd">👁️ Aperçu MD</button>
        </div>
        <div id="rapportContent"><div class="muted" style="text-align:center;padding:40px;">Sélectionnez une semaine et cliquez "Générer"</div></div>
        <pre class="rapport-md-preview" id="rapportMdPreview"></pre>
      </main>
    </div>
  </div>
  <script defer src="/static/js/sidebar.js?v=2000"></script>
  <script defer src="/static/js/v8-features.js?v=2100"></script>
  <script defer src="/static/js/help-shortcut.js?v=2000"></script>
  <script defer src="/static/js/app.js?v=2103"></script>
  <script defer src="/static/js/page-rapport.js?v=2000"></script>

</body>
</html>
