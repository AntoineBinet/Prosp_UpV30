<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="Prosp'Up — CRM Prospection B2B par Up Technologies. Gestion de prospects, suivi des relances et pilotage commercial.">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="icon" href="/static/favicon.ico">
    <title>Prosp'Up — Suivi des push</title>
<link rel="stylesheet" href="/static/css/style.css?v=2103">
</head>
<body data-page="push">
    <div class="container">
        <header>
            <h1><img src="/static/logo-up-technologies.png" alt="Up Technologies" class="header-logo-app"> Prosp'Up — Suivi des push</h1>
            <p class="header-subtitle">Historique des emails / messages envoyés depuis la fiche prospect</p>
        </header>

        <div class="main-layout">
                              <aside class="sidebar"></aside>

            <main class="content">
                <div class="content-header">
                    <div class="content-title">📤 Historique</div>
                    <p style="color: var(--color-text-secondary);">Filtrez et retrouvez rapidement à qui, quand, et quel contenu a été envoyé.</p>
                </div>

                <div class="controls">
                    <input id="pushSearch" type="text" placeholder="🔍 Rechercher (prospect, entreprise, email, sujet)...">
                    <select id="pushChannelFilter">
                        <option value="">Tous les canaux</option>
                        <option value="email">✉️ Email</option>
                        <option value="linkedin">🔗 LinkedIn</option>
                        <option value="other">📨 Autre</option>
                    </select>
                    <button class="btn btn-secondary" onclick="reloadPushLogs()">🔄 Rafraîchir</button>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Prospect</th>
                                <th>Entreprise</th>
                                <th>Email</th>
                                <th>Sujet</th>
                                <th>Canal</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="pushTableBody"></tbody>
                    </table>
                </div>

                <div id="pushEmptyState" style="display:none; text-align:center; padding: 30px; color: var(--color-text-secondary);">
                    Aucun push enregistré pour le moment.
                </div>
            </main>
        </div>
    </div>

    <div class="modal" role="dialog" aria-modal="true" id="modalPushDetail">
        <div class="modal-content">
            <div class="modal-header">
                <span>Détail du push</span>
                <button class="modal-close" aria-label="Fermer" onclick="this.closest('.modal').classList.remove('active')">&times;</button>
            </div>
            <div class="modal-body" id="pushDetailBody"></div>
            <div class="btn-group" style="margin-top: 16px;">
                <button class="btn btn-secondary" onclick="closePushDetail()">Fermer</button>
            </div>
        </div>
    </div>
  <script defer src="/static/js/sidebar.js?v=2000"></script>

    <script defer src="/static/js/v8-features.js?v=2100"></script>
  <script defer src="/static/js/help-shortcut.js?v=2000"></script>
  <script defer src="/static/js/app.js?v=2103"></script>
    <script defer src="/static/js/page-push.js?v=2101"></script>

</body>
</html>
