<!doctype html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Prosp'Up v30 — Refonte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system/tokens.css">
<link rel="stylesheet" href="design-system/components.css">
<style>
  html, body, #root { height: 100%; overflow: hidden; }
  body { background: oklch(0.09 0.010 258); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/_chrome.jsx"></script>
<script type="text/babel" src="screens/dashboard.jsx"></script>
<script type="text/babel" src="screens/prospects.jsx"></script>
<script type="text/babel" src="screens/prospect-detail.jsx"></script>
<script type="text/babel" src="screens/entreprises.jsx"></script>
<script type="text/babel" src="screens/push.jsx"></script>
<script type="text/babel" src="screens/sourcing.jsx"></script>
<script type="text/babel" src="screens/stats.jsx"></script>
<script type="text/babel" src="screens/login-palette.jsx"></script>

<script type="text/babel">
function App() {
  // Each artboard is a 1440×900 desktop frame
  const W = 1440, H = 900;
  return (
    <DesignCanvas>
      <DCSection id="brand" title="Prosp'Up v30" subtitle="Design system · type + palette · voir SPEC.md">
        <DCArtboard id="tokens" label="Design tokens · light + dark" width={1440} height={900}>
          <TokensArtboard />
        </DCArtboard>
        <DCArtboard id="components" label="Composants atomiques" width={1440} height={900}>
          <ComponentsArtboard />
        </DCArtboard>
      </DCSection>

      <DCSection id="entry" title="Entrée" subtitle="Login · Command palette">
        <DCArtboard id="login"  label="Login · split éditorial" width={W} height={H}><ScreenLogin /></DCArtboard>
        <DCArtboard id="palette" label="⌘K · recherche universelle" width={W} height={H}>
          <div style={{ position: 'relative', height: '100%' }}>
            <div style={{ position: 'absolute', inset: 0, filter: 'blur(0)', opacity: 1 }}><ScreenDashboard /></div>
            <div style={{ position: 'absolute', inset: 0 }}><ScreenPalette /></div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="dashboard" title="Dashboard v3" subtitle="Hero éditorial · bento · priorités IA">
        <DCArtboard id="dark"  label="Dark"  width={W} height={H}>
          <div data-theme="dark" style={{ height: '100%' }}><ScreenDashboard /></div>
        </DCArtboard>
        <DCArtboard id="light" label="Light" width={W} height={H}>
          <div data-theme="light" style={{ height: '100%' }}><ScreenDashboard /></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="prospects" title="Prospects" subtitle="Trois vues : table · kanban · split">
        <DCArtboard id="pros-table" label="Table dense + bulk bar" width={W} height={H}><ScreenProspects /></DCArtboard>
        <DCArtboard id="pros-detail" label="Fiche prospect" width={W} height={H}><ScreenProspectDetail /></DCArtboard>
      </DCSection>

      <DCSection id="entreprises" title="Entreprises" subtitle="Comptes B2B avec pipeline CA">
        <DCArtboard id="ent" label="Liste entreprises" width={W} height={H}><ScreenEntreprises /></DCArtboard>
      </DCSection>

      <DCSection id="push" title="Push" subtitle="Campagnes · templates · historique">
        <DCArtboard id="push-campagnes" label="Campagnes + wizard" width={W} height={H}><ScreenPush /></DCArtboard>
      </DCSection>

      <DCSection id="sourcing" title="Candidats" subtitle="Pipeline de sourcing + fiche">
        <DCArtboard id="cand-pipe" label="Pipeline sourcing" width={W} height={H}><ScreenSourcing /></DCArtboard>
        <DCArtboard id="cand-fiche" label="Fiche candidat" width={W} height={H}><ScreenCandidat /></DCArtboard>
      </DCSection>

      <DCSection id="stats" title="Stats & Rapport" subtitle="Fusion Stats + Rapport hebdo éditable">
        <DCArtboard id="stats-dashboard" label="Tableau de bord" width={W} height={H}><ScreenStats /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

// ────── Tokens showcase
function TokensArtboard() {
  const scale = [
    ['ink-0', '#ffffff'], ['ink-100', ''], ['ink-200', ''], ['ink-300', ''],
    ['ink-400', ''], ['ink-500', ''], ['ink-700', ''], ['ink-900', ''], ['ink-950', ''],
  ];
  return (
    <div style={{ background: 'var(--bg)', height: '100%', padding: 40, overflow: 'auto', fontFamily: 'var(--font-sans)' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32 }}>
        <div>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 44, fontWeight: 400, margin: 0, letterSpacing: -0.5 }}>Design system</h2>
          <p style={{ fontSize: 13, color: 'var(--text-3)', marginTop: 6, maxWidth: 420 }}>Inter pour l'UI dense, Instrument Serif pour les grands nombres éditoriaux. Accent indigo calme, signaux mesurés. Tout en OKLCH pour garantir la parité light/dark.</p>

          <h3 style={{ fontSize: 11, letterSpacing: 0.08, textTransform: 'uppercase', color: 'var(--text-3)', marginTop: 28 }}>Typographie</h3>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 64, lineHeight: 1.05, letterSpacing: -0.8 }}>Bonjour,<br/>Antoine.</div>
          <div style={{ fontSize: 28, fontWeight: 500, marginTop: 8 }}>Inter 28/500 · titre</div>
          <div style={{ fontSize: 18, fontWeight: 500 }}>Inter 18/500 · sous-titre</div>
          <div style={{ fontSize: 13 }}>Inter 13/400 · corps · <b>500</b> · <span className="mono">mono 13</span></div>
          <div style={{ fontSize: 11.5, color: 'var(--text-3)', letterSpacing: 0.06, textTransform: 'uppercase' }}>Inter 11.5 · label uppercase</div>

          <h3 style={{ fontSize: 11, letterSpacing: 0.08, textTransform: 'uppercase', color: 'var(--text-3)', marginTop: 28 }}>Échelle neutre</h3>
          <div style={{ display: 'flex', gap: 4 }}>
            {scale.map(([n]) => (
              <div key={n} style={{ flex: 1 }}>
                <div style={{ height: 48, background: `var(--${n})`, border: '1px solid var(--border)', borderRadius: 4 }}/>
                <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 3, fontFamily: 'var(--font-mono)' }}>{n}</div>
              </div>
            ))}
          </div>
        </div>

        <div>
          <h3 style={{ fontSize: 11, letterSpacing: 0.08, textTransform: 'uppercase', color: 'var(--text-3)', marginTop: 0 }}>Accent & signaux</h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
            {[['accent','var(--accent)'],['success','var(--success)'],['warn','var(--warn)'],['danger','var(--danger)'],['info','var(--info)']].map(([n, v]) => (
              <div key={n}>
                <div style={{ height: 56, background: v, borderRadius: 8 }}/>
                <div style={{ fontSize: 11, marginTop: 4, fontFamily: 'var(--font-mono)', color: 'var(--text-3)' }}>{n}</div>
              </div>
            ))}
          </div>

          <h3 style={{ fontSize: 11, letterSpacing: 0.08, textTransform: 'uppercase', color: 'var(--text-3)', marginTop: 24 }}>Mode sombre</h3>
          <div data-theme="dark" style={{ background: 'var(--bg)', padding: 20, borderRadius: 10, border: '1px solid var(--border)' }}>
            <div style={{ color: 'var(--text)', fontSize: 24, fontFamily: 'var(--font-serif)' }}>Parité visuelle · OKLCH</div>
            <div style={{ color: 'var(--text-3)', fontSize: 12, marginTop: 4 }}>Le design system bascule proprement en dark.</div>
            <div style={{ display: 'flex', gap: 4, marginTop: 14 }}>
              <button className="btn btn-accent">Action</button>
              <button className="btn">Secondaire</button>
              <button className="btn btn-ghost">Fantôme</button>
            </div>
            <div style={{ display: 'flex', gap: 6, marginTop: 12 }}>
              <span className="status status-meeting">RDV</span>
              <span className="status status-won">Gagné</span>
              <span className="status status-lost">Perdu</span>
            </div>
          </div>

          <h3 style={{ fontSize: 11, letterSpacing: 0.08, textTransform: 'uppercase', color: 'var(--text-3)', marginTop: 24 }}>Principes</h3>
          <ul style={{ fontSize: 12.5, color: 'var(--text-2)', lineHeight: 1.7, paddingLeft: 18, margin: 0 }}>
            <li>Dense mais respirant — lignes 32px, bordures 1px, peu d'ombres.</li>
            <li>Type-forward — chiffres éditoriaux en serif, contenu en sans.</li>
            <li>Actions révélées au hover, clavier de bout en bout (⌘K).</li>
            <li>Feedback systématique — optimistic, checkmark inline, toast uniquement pour bulk/erreur.</li>
          </ul>
        </div>
      </div>
    </div>
  );
}

// ────── Components showcase
function ComponentsArtboard() {
  return (
    <div style={{ background: 'var(--bg)', height: '100%', padding: 40, overflow: 'auto', color: 'var(--text)' }}>
      <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 36, fontWeight: 400, margin: 0, letterSpacing: -0.3 }}>Composants</h2>
      <p style={{ fontSize: 12.5, color: 'var(--text-3)', marginTop: 4 }}>Boutons · inputs · badges · statuts · segmented · tabs · table · card</p>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, marginTop: 24 }}>
        <div className="card">
          <div className="label">Boutons</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 10 }}>
            <button className="btn btn-accent">Pousser</button>
            <button className="btn btn-primary">Primary</button>
            <button className="btn">Secondary</button>
            <button className="btn btn-ghost">Fantôme</button>
            <button className="btn btn-danger">Danger</button>
          </div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            <button className="btn btn-sm">Small</button>
            <button className="btn">Default</button>
            <button className="btn btn-lg">Large</button>
            <button className="btn btn-icon"><Icon name="plus" size={13}/></button>
            <button className="btn">Avec raccourci <span className="kbd">⌘K</span></button>
          </div>
        </div>

        <div className="card">
          <div className="label">Inputs & segmented</div>
          <div style={{ display: 'grid', gap: 8 }}>
            <input className="input" placeholder="Rechercher…" />
            <select className="select"><option>Tous statuts</option></select>
            <div className="segmented" style={{ alignSelf: 'flex-start' }}>
              <button className="active">Table</button><button>Kanban</button><button>Split</button>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="label">Statuts pipeline</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            <span className="status status-new">Nouveau</span>
            <span className="status status-contact">Contacté</span>
            <span className="status status-meeting">RDV</span>
            <span className="status status-proposal">Propale</span>
            <span className="status status-won">Gagné</span>
            <span className="status status-lost">Perdu</span>
          </div>
          <div className="label" style={{ marginTop: 14 }}>Badges</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            <span className="badge">neutre</span>
            <span className="badge badge-accent">accent</span>
            <span className="badge badge-success">+18%</span>
            <span className="badge badge-warn">attention</span>
            <span className="badge badge-danger">retard</span>
            <span className="badge badge-info">info</span>
          </div>
        </div>

        <div className="card">
          <div className="label">Avatars & KPI</div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
            <div className="avatar">AB</div>
            <div className="avatar avatar-md">MD</div>
            <div className="avatar avatar-lg">TR</div>
            <div style={{ flex: 1 }}/>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: 11, color: 'var(--text-3)' }}>RDV sem.</div>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 32, lineHeight: 1 }}>8</div>
              <div style={{ fontSize: 11, color: 'var(--success)' }}>+2 vs sem-1</div>
            </div>
          </div>
        </div>

        <div className="card card-flush" style={{ gridColumn: 'span 2' }}>
          <div className="tabs" style={{ padding: '0 16px' }}>
            <button className="active">Aperçu</button>
            <button>Timeline <span className="tab-count">24</span></button>
            <button>Push <span className="tab-count">6</span></button>
          </div>
          <table className="table">
            <thead><tr><th>Nom</th><th>Entreprise</th><th>Statut</th><th>Dernière</th></tr></thead>
            <tbody>
              <tr><td>Marie Dubois</td><td>Capgemini</td><td><span className="status status-meeting">RDV</span></td><td>2h</td></tr>
              <tr className="selected"><td>Thomas Martin</td><td>Sopra Steria</td><td><span className="status status-contact">Contacté</span></td><td>Hier</td></tr>
              <tr><td>Julie Bernard</td><td>Atos</td><td><span className="status status-proposal">Propale</span></td><td>3j</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
