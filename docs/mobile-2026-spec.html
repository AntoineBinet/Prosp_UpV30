function TabIcon({ name, color, size = 22 }) {
  const s = size;
  const stroke = color;
  switch (name) {
    case 'home':
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M4 11.5L12 5l8 6.5V19a2 2 0 01-2 2h-3v-6h-6v6H6a2 2 0 01-2-2v-7.5z" stroke={stroke} strokeWidth="1.8" strokeLinejoin="round"/></svg>;
    case 'people':
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.5" stroke={stroke} strokeWidth="1.8"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke={stroke} strokeWidth="1.8" strokeLinecap="round"/><circle cx="17" cy="7" r="2.8" stroke={stroke} strokeWidth="1.6"/><path d="M15 14c3.3 0 6 2.2 6 5" stroke={stroke} strokeWidth="1.6" strokeLinecap="round"/></svg>;

      return <svg width={s+2} height={s+2} viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill={stroke}/></svg>;
    case 'building':
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke={stroke} strokeWidth="1.8"/><path d="M8 7h2M14 7h2M8 11h2M14 11h2M8 15h2M14 15h2" stroke={stroke} strokeWidth="1.8" strokeLinecap="round"/></svg>;
    case 'chart':
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M4 19V5M4 19h16" stroke={stroke} strokeWidth="1.8" strokeLinecap="round"/><rect x="7"  y="12" width="2.8" height="5" rx="1" fill={stroke}/><rect x="12" y="8"  width="2.8" height="9" rx="1" fill={stroke}/><rect x="17" y="4"  width="2.8" height="13" rx="1" fill={stroke}/></svg>;
  }
  return null;
}

function TabBar({ active = 'dashboard', dark = true, onTab }) {
  const t = theme(dark ? 'dark' : 'light');
  const idx = TABS.findIndex(x => x.id === active);
  return (
    <div style={{
      position: 'absolute', bottom: 16, left: 12, right: 12, zIndex: 50,
      height: 64,
    }}>
      <Glass dark={dark} radius={28} style={{
        height: '100%', width: '100%', padding: 4,
        boxShadow: dark ? '0 10px 30px rgba(0,0,0,0.45)' : '0 10px 30px rgba(0,0,0,0.08)',
      }}>
        <div style={{ position: 'relative', width: '100%', height: '100%', display: 'flex' }}>
          <div style={{
            position: 'absolute', top: 0, bottom: 0,
            width: `${100 / TABS.length}%`,
            left: `${(idx * 100) / TABS.length}%`,
            transition: 'left .35s cubic-bezier(.32,1.08,.62,1)',
            padding: 6, boxSizing: 'border-box', pointerEvents: 'none',
          }}>
            <div style={{
              width: '100%', height: '100%', borderRadius: 20,
              background: T.accentSoft,
              boxShadow: 'inset 0 0 0 0.5px rgba(255,107,53,0.22)',
            }} />
          </div>
          {TABS.map((tab) => {
            const isActive = tab.id === active;
            const color = isActive ? T.accent : t.text2;
            return (
              <button key={tab.id} onClick={() => onTab && onTab(tab.id)}
                style={{
                  flex: 1, display: 'flex', flexDirection: 'column',
                  alignItems: 'center', justifyContent: 'center', gap: 2,
                  border: 'none', background: 'transparent',
                  cursor: 'pointer', padding: 0, color,
                  fontFamily: font, fontSize: 10, fontWeight: 600, letterSpacing: 0.1,
                  position: 'relative', zIndex: 1,
                }}>
                <TabIcon name={tab.icon} color={color} size={tab.primary ? 24 : 22} />
                <span style={{ opacity: isActive ? 1 : 0.8 }}>{tab.label}</span>
              </button>
            );
          })}
        </div>
      </Glass>
    </div>
  );
}

function RingXP({ dark, value, max, level }) {
  const t = theme(dark ? 'dark' : 'light');
  const size = 148, stroke = 10, r = (size - stroke) / 2;
  const C = 2 * Math.PI * r;
  const pct = value / max;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} stroke={t.bg4} strokeWidth={stroke} fill="none" />
        <circle cx={size/2} cy={size/2} r={r} stroke="url(#xpGrad)" strokeWidth={stroke}
          strokeLinecap="round" fill="none"
          strokeDasharray={`${C*pct} ${C}`} />
        <defs>
          <linearGradient id="xpGrad" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stopColor="#FF6B35" />
            <stop offset="100%" stopColor="#FFB088" />
          </linearGradient>
        </defs>
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontSize: 11, color: t.text3, letterSpacing: 1, fontWeight: 600 }}>NIVEAU</div>
        <div style={{ fontSize: 40, fontWeight: 700, color: t.text, letterSpacing: -1, lineHeight: 1 }}>{level}</div>
        <div style={{ fontSize: 11, color: t.text2, marginTop: 3, fontVariantNumeric: 'tabular-nums' }}>{value} / {max} XP</div>
      </div>
    </div>
  );
}

function ObjBar({ dark, obj }) {

          <span style={{ color: t.text, fontWeight: 600 }}>{obj.done}</span>

        </span>

      <div style={{ height: 6, borderRadius: 3, background: t.bg4, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${pct*100}%`, background: obj.color, borderRadius: 3, transition: 'width .5s' }} />

}

    call: { bg: T.accent, color: '#fff', icon: <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M4 4l3-1 2 5-2 1c1 2.5 3 4.5 5.5 5.5l1-2 5 2-1 3c-8 0-14-6-14-14z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/></svg> },

    star: { bg: t.bg3, color: '#FBBF24', icon: <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2l3 7 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1 3-7z" fill="currentColor"/></svg> },
  }[kind];
  return (

      width: size, height: size, borderRadius: size/2,
      background: config.bg, color: config.color,
      border: kind === 'call' ? 'none' : `0.5px solid ${t.border2}`,

    }}>{config.icon}</button>

}

function ScreenProsp({ dark = true, onTab, active = 'prosp' }) {
  const t = theme(dark ? 'dark' : 'light');
  const [idx, setIdx] = React.useState(0);
  const [decision, setDecision] = React.useState(null);
  const queue = PROSPECTS.slice(idx, idx + 3);
  const current = queue[0];
  const done = idx, total = 42;

  const decide = (kind) => {
    setDecision(kind);
    setTimeout(() => { setDecision(null); setIdx(i => Math.min(i + 1, PROSPECTS.length - 1)); }, 280);
  };

  if (!current) return null;

  return (
    <Device dark={dark} fill={dark ? '#050505' : '#F6F5F2'}>
      <div aria-hidden style={{
        position: 'absolute', top: 100, left: '10%', right: '10%', height: 400,
        background: 'radial-gradient(ellipse at center, rgba(255,107,53,0.2), transparent 70%)',
        filter: 'blur(30px)', pointerEvents: 'none', zIndex: 0,
      }} />

      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 16px 14px' }}>
        <IconBtn dark={dark}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </IconBtn>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: t.text3, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 600 }}>Mode Prosp</div>
          <div style={{ fontSize: 15, color: t.text, fontWeight: 600, letterSpacing: -0.2 }}>Filtre : Aerospace FR · 5★</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6,
          padding: '6px 12px', borderRadius: 999, background: T.accentSoft, color: T.accent,
          fontSize: 12, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>
          <span style={{ width: 6, height: 6, borderRadius: 3, background: T.accent, boxShadow: `0 0 8px ${T.accent}` }} />
          {done + 1} / {total}
        </div>
      </div>

      <div style={{ margin: '0 16px 18px', height: 3, borderRadius: 2, background: t.bg4, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${((done+1)/total)*100}%`, background: `linear-gradient(90deg, ${T.accent}, #FF8C42)`, transition: 'width .35s' }} />
      </div>

      <div style={{ flex: 1, position: 'relative', padding: '0 20px', zIndex: 1 }}>
        {queue.slice().reverse().map((p, i) => {
          const depth = queue.length - 1 - i;
          const isFront = depth === 0;
          const swing = decision && isFront
            ? (decision === 'skip' ? -24 : decision === 'call' ? 24 : 0)
            : 0;
          const opacity = decision && isFront ? 0 : 1;
          return (
            <ProspCard key={p.id + '-' + idx + '-' + depth} dark={dark} p={p}
              depth={depth}
              style={{
                transform: `translateY(${depth*8}px) scale(${1 - depth*0.04}) rotate(${swing}deg) translateX(${swing * 8}px)`,
                opacity,
                transition: 'transform .28s cubic-bezier(.32,1.08,.62,1), opacity .28s',
                zIndex: 10 - depth,
              }} />
          );
        })}
      </div>

      <div style={{ padding: '16px 20px 96px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', zIndex: 1 }}>
        <ActionCircle dark={dark} kind="skip"    onClick={() => decide('skip')} />
        <ActionCircle dark={dark} kind="note"    onClick={() => decide('note')} />
        <ActionCircle dark={dark} kind="call"    onClick={() => decide('call')} big />
        <ActionCircle dark={dark} kind="mail"    onClick={() => decide('mail')} />
        <ActionCircle dark={dark} kind="star"    onClick={() => decide('star')} />
      </div>

      <TabBar dark={dark} active={active} onTab={onTab} />
    </Device>
  );
}

function MatchRing({ score, color, dark }) {
  const t = theme(dark ? 'dark' : 'light');

  return (
    <div style={{ position: 'relative', width: s, height: s, flexShrink: 0 }}>

        <circle cx={s/2} cy={s/2} r={r} stroke={t.bg4} strokeWidth={stroke} fill="none"/>

function Kpi({ dark, label, value, delta, up, accent }) {
  const t = theme(dark ? 'dark' : 'light');
  return (
    <div style={{
      padding: 16, borderRadius: 18,
      background: accent
        ? (dark ? 'linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,107,53,0.04))' : 'linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,107,53,0.02))')
        : t.bg3,
      border: `0.5px solid ${accent ? 'rgba(255,107,53,0.2)' : t.border}`,
    }}>
      <div style={{ fontSize: 11, color: t.text3, textTransform: 'uppercase', letterSpacing: 0.5, fontWeight: 600 }}>{label}</div>
      <div style={{ fontSize: 28, fontWeight: 700, color: accent ? T.accent : t.text, letterSpacing: -0.8, marginTop: 4, lineHeight: 1 }}>{value}</div>
      <div style={{ marginTop: 6, fontSize: 11, color: up ? '#4ADE80' : '#F87171', fontWeight: 600 }}>
        {up ? '↗' : '↘'} {delta} <span style={{ color: t.text3, fontWeight: 500 }}>vs S-1</span>
      </div>
    </div>
  );
}

function Chart({ data, dark }) {
  const t = theme(dark ? 'dark' : 'light');
  const W = 300, H = 140, pad = 8;
  const max = Math.max(...data.map(d => d.calls));
  const bw = (W - pad*2) / data.length;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H + 24}`} style={{ display: 'block' }}>
      {[0.25, 0.5, 0.75, 1].map(f => (
        <line key={f} x1={pad} x2={W-pad} y1={H - H*f} y2={H - H*f} stroke={t.divider} strokeDasharray="2 3" strokeWidth="0.5"/>
      ))}
      {data.map((d, i) => {
        const x = pad + i * bw + bw/2;
        const hCalls = (d.calls / max) * H * 0.9;
        const hRdv = (d.rdv / 5) * H * 0.9;
        return (
          <g key={i}>
            <rect x={x - 10} y={H - hCalls} width="7" height={hCalls} rx="3" fill={T.accent}/>
            <rect x={x + 3} y={H - hRdv} width="7" height={hRdv} rx="3" fill="#4ADE80"/>
            <text x={x} y={H + 16} textAnchor="middle" fontSize="10" fill={t.text2} fontFamily={font} fontWeight="500">{d.day}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DESIGN CANVAS — Figma-ish pan/zoom viewport with sections + focus overlay
// ═══════════════════════════════════════════════════════════════════════════

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

function DesignCanvas({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const [focus, setFocus] = React.useState(null);

  const registry = {};
  const sectionMeta = {};
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    sectionMeta[sid] = {
      title: sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: srcIds,
    };
  });

  const api = React.useMemo(() => ({ setFocus }), []);

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') setFocus(null); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{children}</DCViewport>
      {focus && registry[focus] && (
        <DCFocusOverlay entry={registry[focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} focus={focus} setFocus={setFocus} />
      )}
    </DCCtx.Provider>
  );
}

function DCViewport({ children, minScale, maxScale, style }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    let isGesturing = false;

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return;
      if (e.ctrlKey) {
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    let gsBase = 1;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot]');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div ref={vpRef} className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg, overflow: 'hidden',
        overscrollBehavior: 'none', touchAction: 'none',
        position: 'relative', fontFamily: DC.font, boxSizing: 'border-box',
        ...style,
      }}>
      <div ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0', willChange: 'transform',
          width: 'max-content', minWidth: '100%', minHeight: '100%',
          padding: '60px 0 80px',
        }}>
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  return (
    <div data-dc-section={id} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <div style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6 }}>{title}</div>
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {artboards.map((ab) => (
          <DCArtboardFrame key={ab.props.id ?? ab.props.label} sectionId={id} artboard={ab} />
        ))}
      </div>
    </div>
  );
}

function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard }) {
  const ctx = React.useContext(DCCtx);
  const { id: rawId, label, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? label;
  const onFocus = () => ctx && ctx.setFocus(`${sectionId}/${id}`);

  return (
    <div data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <span style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }}>{label}</span>
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children}
      </div>
    </div>
  );
}

function DCFocusOverlay({ entry, sectionMeta, sectionOrder, focus, setFocus }) {
  const { sectionId, artboard } = entry;
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  return ReactDOM.createPortal(
    <div onClick={() => setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      <div style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}
