<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>ProspUp — Page introuvable</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .error-card { text-align: center; max-width: 400px; }
    .error-code { font-size: 72px; font-weight: 700; opacity: .3; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
    .btn-home {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn-home:hover { opacity: .85; }
    .btn-update {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s;
      margin-left: 12px;
    }
    .btn-update:hover { opacity: .85; }
    .btn-update:disabled { opacity: .5; cursor: not-allowed; }
    .update-status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .update-status.success {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .update-status.error {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .update-status.info {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <h1>Page introuvable</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
    <div style="margin-top: 24px;">
      <a href="/dashboard" class="btn-home">Retour au Dashboard</a>
      <button id="btnUpdate" class="btn-update" onclick="triggerUpdate()">🔄 Réeffectuer MAJ</button>
      <button id="btnRollback" class="btn-update" onclick="triggerRollback()" style="background: linear-gradient(135deg, #ef4444, #dc2626); margin-left: 12px;">⏪ Rollback</button>
    </div>
    <div id="updateStatus" class="update-status"></div>
  </div>
  <script>
    async function triggerUpdate() {
      const btn = document.getElementById('btnUpdate');
      const status = document.getElementById('updateStatus');
      
      btn.disabled = true;
      btn.textContent = '⏳ Mise à jour en cours...';
      status.style.display = 'block';
      status.className = 'update-status info';
      status.textContent = 'Récupération des dernières modifications depuis Git...';
      
      try {
        const response = await fetch('/api/deploy/pull-from-404', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        
        const data = await response.json();
        
        if (data.ok) {
          status.className = 'update-status success';
          status.textContent = '✅ ' + (data.message || 'Mise à jour appliquée ! Redémarrez le serveur pour appliquer les changements.');
          btn.textContent = '✅ MAJ effectuée';
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 2000);
        } else {
          status.className = 'update-status error';
          status.textContent = '❌ Erreur : ' + (data.error || 'Échec de la mise à jour');
          btn.disabled = false;
          btn.textContent = '🔄 Réeffectuer MAJ';
        }
      } catch (error) {
        status.className = 'update-status error';
        status.textContent = '❌ Erreur réseau : ' + error.message;
        btn.disabled = false;
        btn.textContent = '🔄 Réeffectuer MAJ';
      }
    }
    
    async function triggerRollback() {
      const btn = document.getElementById('btnRollback');
      const status = document.getElementById('updateStatus');
      
      if (!confirm('⚠️ Êtes-vous sûr de vouloir revenir au commit précédent ? Cette action est irréversible.')) {
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '⏳ Rollback en cours...';
      status.style.display = 'block';
      status.className = 'update-status info';
      status.textContent = 'Retour au commit précédent...';
      
      try {
        const response = await fetch('/api/deploy/rollback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        
        const data = await response.json();
        
        if (data.ok) {
          status.className = 'update-status success';
          status.textContent = '✅ ' + (data.message || 'Rollback effectué ! Redémarrez le serveur pour appliquer les changements.');
          btn.textContent = '✅ Rollback effectué';
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 2000);
        } else {
          status.className = 'update-status error';
          status.textContent = '❌ Erreur : ' + (data.error || 'Échec du rollback');
          btn.disabled = false;
          btn.textContent = '⏪ Rollback';
        }
      } catch (error) {
        status.className = 'update-status error';
        status.textContent = '❌ Erreur réseau : ' + error.message;
        btn.disabled = false;
        btn.textContent = '⏪ Rollback';
      }
    }
  </script>
</body>
</html>
