<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0d10">
  <title>Prosp'Up — Page introuvable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: oklch(0.14 0.008 258);
      --surface: oklch(0.175 0.012 258);
      --surface-2: oklch(0.205 0.013 258);
      --border: oklch(0.26 0.014 258);
      --border-strong: oklch(0.32 0.015 258);
      --text: oklch(0.97 0.003 258);
      --text-2: oklch(0.78 0.010 258);
      --text-3: oklch(0.60 0.013 258);
      --accent: oklch(0.70 0.17 258);
      --accent-hover: oklch(0.76 0.16 258);
      --accent-soft: color-mix(in oklch, var(--accent) 20%, transparent);
      --warn: oklch(0.78 0.16 80);
      --warn-soft: color-mix(in oklch, var(--warn) 18%, transparent);
      --danger: oklch(0.70 0.22 22);
      --danger-soft: color-mix(in oklch, var(--danger) 18%, transparent);
      --success: oklch(0.72 0.18 155);
      --success-soft: color-mix(in oklch, var(--success) 18%, transparent);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --surface: #ffffff;
        --surface-2: #f4f4f5;
        --border: #e4e4e7;
        --border-strong: #d4d4d8;
        --text: #18181b;
        --text-2: #3f3f46;
        --text-3: #71717a;
        --accent: oklch(0.58 0.17 258);
        --accent-hover: oklch(0.52 0.18 258);
      }
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      letter-spacing: -0.005em;
    }
    .error-card {
      text-align: center;
      max-width: 480px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,.4);
    }
    .error-code {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 96px;
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    h1 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.005em;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, border-color .15s, color .15s, transform .08s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: oklch(0.12 0.01 258);
    }
    .btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-2);
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
    .btn-danger { color: var(--danger); border-color: var(--border); background: transparent; }
    .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
    .update-status {
      margin-top: 18px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12.5px;
      line-height: 1.55;
      display: none;
      text-align: left;
    }
    .update-status.success { background: var(--success-soft); color: var(--success); border-color: color-mix(in oklch, var(--success) 30%, transparent); }
    .update-status.error { background: var(--danger-soft); color: var(--danger); border-color: color-mix(in oklch, var(--danger) 30%, transparent); }
    .update-status.info { background: var(--accent-soft); color: var(--accent); border-color: color-mix(in oklch, var(--accent) 30%, transparent); }
    .retry-info {
      margin-top: 12px;
      font-size: 11.5px;
      color: var(--text-3);
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="brand">Prosp'Up</div>
    <div class="error-code">404</div>
    <h1>Page introuvable.</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée.<br>
    Si ce problème survient après une mise à jour, utilisez les boutons ci-dessous.</p>
    <div class="actions">
      <a href="/v30/dashboard" class="btn btn-accent">Retour au Dashboard</a>
      <button id="btnUpdate" class="btn" onclick="triggerUpdate()">MAJ + Redémarrage</button>
      <button id="btnRollback" class="btn btn-danger" onclick="triggerRollback()">Rollback</button>
    </div>
    <div id="updateStatus" class="update-status"></div>
    <div id="retryInfo" class="retry-info"></div>
  </div>
  <script>
    let retryCount = 0;
    const MAX_RETRIES = 5;
    const RELOAD_DELAY = 8000;

    function showStatus(type, text) {
      const el = document.getElementById('updateStatus');
      el.style.display = 'block';
      el.className = 'update-status ' + type;
      el.innerHTML = text;
    }

    function scheduleReload(delay) {
      const info = document.getElementById('retryInfo');
      let remaining = Math.ceil(delay / 1000);
      info.textContent = 'Rechargement dans ' + remaining + 's…';
      const iv = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(iv);
          info.textContent = 'Rechargement…';
          window.location.href = '/v30/dashboard';
        } else {
          info.textContent = 'Rechargement dans ' + remaining + 's…';
        }
      }, 1000);
    }

    async function triggerUpdate() {
      const btn = document.getElementById('btnUpdate');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>MAJ en cours…';
      showStatus('info', 'Récupération des dernières modifications Git + redémarrage automatique…');

      try {
        const res = await fetch('/api/deploy/pull-from-404', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();

        if (data.ok) {
          showStatus('success', (data.message || 'Mise à jour appliquée ! Redémarrage automatique en cours…'));
          btn.innerHTML = 'MAJ effectuée';
          scheduleReload(RELOAD_DELAY);
        } else {
          showStatus('error', (data.error || 'Échec de la mise à jour'));
          btn.disabled = false;
          btn.innerHTML = 'MAJ + Redémarrage';
        }
      } catch (e) {
        showStatus('error', 'Erreur réseau : ' + e.message + '<br>Le serveur ne répond peut-être plus. Retry automatique…');
        btn.disabled = false;
        btn.innerHTML = 'MAJ + Redémarrage';
        retryReload();
      }
    }

    async function triggerRollback() {
      const btn = document.getElementById('btnRollback');
      if (!confirm('Revenir au commit précédent ? Le serveur redémarrera.')) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Rollback…';
      showStatus('info', 'Retour au commit précédent…');

      try {
        const res = await fetch('/api/deploy/rollback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();

        if (data.ok) {
          showStatus('success', (data.message || 'Rollback effectué !'));
          btn.innerHTML = 'Rollback effectué';
          scheduleReload(RELOAD_DELAY);
        } else {
          showStatus('error', (data.error || 'Échec du rollback'));
          btn.disabled = false;
          btn.innerHTML = 'Rollback';
        }
      } catch (e) {
        showStatus('error', 'Erreur réseau : ' + e.message);
        btn.disabled = false;
        btn.innerHTML = 'Rollback';
        retryReload();
      }
    }

    function retryReload() {
      if (retryCount >= MAX_RETRIES) {
        document.getElementById('retryInfo').textContent =
          'Le serveur ne répond plus. Le superviseur devrait le relancer automatiquement. Rechargez manuellement dans quelques instants.';
        return;
      }
      retryCount++;
      const delay = 10 + retryCount * 5;
      const info = document.getElementById('retryInfo');
      info.textContent = 'Tentative ' + retryCount + '/' + MAX_RETRIES + ' — rechargement dans ' + delay + 's…';
      setTimeout(() => { window.location.reload(); }, delay * 1000);
    }
  </script>
</body>
</html>
