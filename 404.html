<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>ProspUp — Page introuvable</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .error-card { text-align: center; max-width: 480px; }
    .error-code { font-size: 72px; font-weight: 700; opacity: .3; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 24px; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-home { background: linear-gradient(135deg, #6366f1, #818cf8); }
    .btn-update { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .btn-rollback { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .update-status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      line-height: 1.5;
    }
    .update-status.success { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
    .update-status.error { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
    .update-status.info { background: rgba(59,130,246,.15); color: #60a5fa; border: 1px solid rgba(59,130,246,.3); }
    .retry-info { margin-top: 12px; font-size: 12px; color: #64748b; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <h1>Page introuvable</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée.<br>
    Si ce problème survient après une mise à jour, utilisez les boutons ci-dessous.</p>
    <div class="actions">
      <a href="/dashboard" class="btn btn-home">Retour au Dashboard</a>
      <button id="btnUpdate" class="btn btn-update" onclick="triggerUpdate()">MAJ + Redémarrage</button>
      <button id="btnRollback" class="btn btn-rollback" onclick="triggerRollback()">Rollback</button>
    </div>
    <div id="updateStatus" class="update-status"></div>
    <div id="retryInfo" class="retry-info"></div>
  </div>
  <script>
    let retryCount = 0;
    const MAX_RETRIES = 5;
    const RELOAD_DELAY = 8000;

    function showStatus(type, text) {
      const el = document.getElementById('updateStatus');
      el.style.display = 'block';
      el.className = 'update-status ' + type;
      el.innerHTML = text;
    }

    function scheduleReload(delay) {
      const info = document.getElementById('retryInfo');
      let remaining = Math.ceil(delay / 1000);
      info.textContent = 'Rechargement dans ' + remaining + 's…';
      const iv = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(iv);
          info.textContent = 'Rechargement…';
          window.location.href = '/dashboard';
        } else {
          info.textContent = 'Rechargement dans ' + remaining + 's…';
        }
      }, 1000);
    }

    async function triggerUpdate() {
      const btn = document.getElementById('btnUpdate');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>MAJ en cours…';
      showStatus('info', 'Récupération des dernières modifications Git + redémarrage automatique…');

      try {
        const res = await fetch('/api/deploy/pull-from-404', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();

        if (data.ok) {
          showStatus('success', (data.message || 'Mise à jour appliquée ! Redémarrage automatique en cours…'));
          btn.innerHTML = 'MAJ effectuée';
          scheduleReload(RELOAD_DELAY);
        } else {
          showStatus('error', (data.error || 'Échec de la mise à jour'));
          btn.disabled = false;
          btn.innerHTML = 'MAJ + Redémarrage';
        }
      } catch (e) {
        showStatus('error', 'Erreur réseau : ' + e.message + '<br>Le serveur ne répond peut-être plus. Retry automatique…');
        btn.disabled = false;
        btn.innerHTML = 'MAJ + Redémarrage';
        retryReload();
      }
    }

    async function triggerRollback() {
      const btn = document.getElementById('btnRollback');
      if (!confirm('Revenir au commit précédent ? Le serveur redémarrera.')) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Rollback…';
      showStatus('info', 'Retour au commit précédent…');

      try {
        const res = await fetch('/api/deploy/rollback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();

        if (data.ok) {
          showStatus('success', (data.message || 'Rollback effectué !'));
          btn.innerHTML = 'Rollback effectué';
          scheduleReload(RELOAD_DELAY);
        } else {
          showStatus('error', (data.error || 'Échec du rollback'));
          btn.disabled = false;
          btn.innerHTML = 'Rollback';
        }
      } catch (e) {
        showStatus('error', 'Erreur réseau : ' + e.message);
        btn.disabled = false;
        btn.innerHTML = 'Rollback';
        retryReload();
      }
    }

    function retryReload() {
      if (retryCount >= MAX_RETRIES) {
        document.getElementById('retryInfo').textContent =
          'Le serveur ne répond plus. Le superviseur devrait le relancer automatiquement. Rechargez manuellement dans quelques instants.';
        return;
      }
      retryCount++;
      const delay = 10 + retryCount * 5;
      const info = document.getElementById('retryInfo');
      info.textContent = 'Tentative ' + retryCount + '/' + MAX_RETRIES + ' — rechargement dans ' + delay + 's…';
      setTimeout(() => { window.location.reload(); }, delay * 1000);
    }
  </script>
</body>
</html>
